name: publish

# Publishes pyyorkshirewater to PyPI on every pushed tag matching
# v*.*.*, using PyPI's Trusted Publisher (OIDC) flow so no API
# token is stored in repo secrets.
#
# One-time PyPI setup:
#   https://pypi.org/manage/account/publishing/
#   - Owner:        dan-simms1
#   - Repository:   pyyorkshirewater
#   - Workflow:     publish.yml
#   - Environment:  pypi
#
# After that, releasing is just `git tag -a vX.Y.Z && git push --tags`.
# The build + publish jobs run automatically and the package appears
# at https://pypi.org/p/pyyorkshirewater/X.Y.Z within a minute or two.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build
      - name: Build sdist and wheel
        run: python -m build
      - name: Upload artefacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/pyyorkshirewater
    permissions:
      id-token: write
    steps:
      - name: Download artefacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Publish via Trusted Publishing
        uses: pypa/gh-action-pypi-publish@release/v1
